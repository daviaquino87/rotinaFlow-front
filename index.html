<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>rotinaFlow - Organizador Inteligente</title>

    <!--
      Content Security Policy (CSP)
      Note: A stronger CSP should also be enforced via HTTP response headers on the server.
      This meta tag provides a client-side fallback and improves defence-in-depth.
      - script-src 'self'           : only load scripts from the same origin
      - style-src 'unsafe-inline'   : required by Tailwind CSS v4 inline style generation
      - connect-src 'self' https:   : allow API calls to same origin + HTTPS endpoints
      - img-src data: https:        : allow data URIs (base64 images) and HTTPS sources
      - font-src https://fonts.gstatic.com: Google Fonts only
    -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https:;
        connect-src 'self' https:;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
      "
    />

    <!-- Prevents MIME-type sniffing attacks -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Controls referrer information sent in requests -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <link rel="icon" type="image/png" href="/images/logo-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="rotinaFlow" />
    <link rel="apple-touch-icon" href="/images/logo-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
